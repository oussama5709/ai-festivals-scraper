name: 🤖 Daily AI Events Scrape

on:
  schedule:
    # يعمل كل يوم الساعة 2 صبح UTC (أو وقت آخر اختره)
    - cron: '0 2 * * *'
  
  # يسمح بتشغيل يدوي من GitHub
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: 🔗 Trigger Apify Actor
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          APIFY_ACTOR_ID: ${{ secrets.APIFY_ACTOR_ID }}
        run: |
          echo "🚀 Starting daily scrap..."
          
          RESPONSE=$(curl -X POST \
            "https://api.apify.com/v2/acts/${APIFY_ACTOR_ID}/runs?token=${APIFY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{
              "searchRegions": ["worldwide", "middle-east", "africa"],
              "maxResults": 100,
              "enableEnrichment": true,
              "enableAIValidation": true
            }')
          
          echo "Response: $RESPONSE"
          
          # استخرج Run ID
                    RUN_ID=$(echo $RESPONSE | sed -n 's/.*"id":[[:space:]]*"\([^"]*\)".*/\1/p')
          
          if [ -z "$RUN_ID" ]; then
            echo "❌ Failed to start actor. Response was: $RESPONSE"
            exit 1
          fi
          
                    RUN_ID=$(echo $RESPONSE | sed -n 's/.*"id":[[:space:]]*"\([^"]*\)".*/\1/p')         
          # انتظر حتى ينتهي الـ Actor
          echo "⏳ Waiting for actor to complete..."
          for i in {1..240}; do
            RUN_DATA=$(curl -s "https://api.apify.com/v2/actor-runs/${RUN_ID}?token=${APIFY_TOKEN}")
                                                            STATUS=$(echo $RUN_DATA | sed -n 's/.*"status":[[:space:]]*"\([^"]*\)".*/\1/p')
            
            if [ "$STATUS" = "SUCCEEDED" ]; then
              echo "✅ Scrape completed successfully!"
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "ABORTED" ] || [ "$STATUS" = "TIMED-OUT" ]; then
              echo "❌ Scrape failed with status: $STATUS"
              exit 1
            fi
            
            echo "Status: $STATUS... ($((i*15))s elapsed)"
            sleep 15
          done
          
          echo "⚠️ Timeout waiting for actor"
          exit 1

      - name: 📧 Notify on success
        if: success()
        run: |
          echo "✅ Daily scrape completed successfully!"
          echo "🎉 Events collected and dataset updated"

      - name: 📧 Notify on failure
        if: failure()
        run: |
          echo "❌ Daily scrape failed"
          echo "⚠️ Please check Apify console for details"
